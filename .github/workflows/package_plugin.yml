name: Package plugin

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to checkout'
        required: false
        default: ''
  push:
    tags:
      - '*'

jobs:
  package_plugin:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        ref: ${{ github.event.inputs.ref || github.ref }}

    - name: Set up Python 3.10
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Upgrade pipenv
      run: |
        python3 -m pip install --upgrade pipenv

    - name: Check that Pipfile.lock is not stale
      run: |
        pipenv verify

    # For pyuic5/6
    - name: Install dev tools
      run: |
        pipenv install --dev

    - name: Run package_plugin.sh
      run: |
        ./package_plugin.sh

    - name: Upload crowd_anki dist artifact
      uses: actions/upload-artifact@v6
      with:
        name: crowd-anki-packaged-plugin
        path: crowd_anki_*.zip

    - name: Rename to .ankiaddon
      run: |
        mv crowd_anki_*.zip crowd_anki.ankiaddon

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: crowd_anki.ankiaddon
